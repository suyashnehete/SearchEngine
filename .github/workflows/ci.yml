name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '18'
  MAVEN_OPTS: '-Xmx1024m'

jobs:
  # Backend testing and quality checks
  backend-test:
    name: Backend Tests & Quality
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin
          POSTGRES_DB: search_engine_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Shallow clones should be disabled for better analysis

    - name: Set up JDK ${{ env.JAVA_VERSION }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        cache: maven

    - name: Cache Maven dependencies
      uses: actions/cache@v3
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2

    - name: Run backend tests
      run: |
        cd search_engine_microservice
        for service in */; do
          if [ -f "$service/pom.xml" ]; then
            echo "Testing $service..."
            cd "$service"
            mvn clean test jacoco:report -Dspring.profiles.active=test
            cd ..
          fi
        done
      env:
        DB_HOST: localhost
        DB_PORT: 5432
        DB_USERNAME: admin
        DB_PASSWORD: admin
        DB_NAME: search_engine_test
        REDIS_HOST: localhost
        REDIS_PORT: 6379

    - name: Run code quality checks
      run: |
        cd search_engine_microservice
        for service in */; do
          if [ -f "$service/pom.xml" ]; then
            echo "Quality check for $service..."
            cd "$service"
            mvn checkstyle:check spotbugs:check
            cd ..
          fi
        done

    - name: Run security scan
      run: |
        cd search_engine_microservice
        for service in */; do
          if [ -f "$service/pom.xml" ]; then
            echo "Security scan for $service..."
            cd "$service"
            mvn org.owasp:dependency-check-maven:check -DfailBuildOnCVSS=7
            cd ..
          fi
        done

    - name: Generate test report
      uses: dorny/test-reporter@v1
      if: success() || failure()
      with:
        name: Backend Tests
        path: 'search_engine_microservice/*/target/surefire-reports/*.xml'
        reporter: java-junit

    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      with:
        files: search_engine_microservice/*/target/site/jacoco/jacoco.xml
        flags: backend
        name: backend-coverage

  # Frontend testing and quality checks
  frontend-test:
    name: Frontend Tests & Quality
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js ${{ env.NODE_VERSION }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: search-engine-ui/package-lock.json

    - name: Install dependencies
      run: |
        cd search-engine-ui
        npm ci

    - name: Run linting
      run: |
        cd search-engine-ui
        npm run lint

    - name: Check code formatting
      run: |
        cd search-engine-ui
        npm run format:check

    - name: Run unit tests
      run: |
        cd search-engine-ui
        npm run test:ci

    - name: Run security audit
      run: |
        cd search-engine-ui
        npm audit --audit-level moderate

    - name: Build application
      run: |
        cd search-engine-ui
        npm run build:prod

    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      with:
        files: search-engine-ui/coverage/lcov.info
        flags: frontend
        name: frontend-coverage

  # SonarQube analysis
  sonarqube:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK ${{ env.JAVA_VERSION }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'

    - name: Cache SonarQube packages
      uses: actions/cache@v3
      with:
        path: ~/.sonar/cache
        key: ${{ runner.os }}-sonar
        restore-keys: ${{ runner.os }}-sonar

    - name: Cache Maven dependencies
      uses: actions/cache@v3
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2

    - name: Set up Node.js ${{ env.NODE_VERSION }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: search-engine-ui/package-lock.json

    - name: Install frontend dependencies
      run: |
        cd search-engine-ui
        npm ci

    - name: Run frontend tests for coverage
      run: |
        cd search-engine-ui
        npm run test:ci

    - name: Build and analyze
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: |
        # Build backend services
        cd search_engine_microservice
        for service in */; do
          if [ -f "$service/pom.xml" ]; then
            cd "$service"
            mvn clean compile test jacoco:report
            cd ..
          fi
        done
        cd ..
        
        # Run SonarQube analysis
        mvn sonar:sonar \
          -Dsonar.projectKey=search-engine \
          -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }} \
          -Dsonar.host.url=https://sonarcloud.io \
          -Dsonar.login=${{ secrets.SONAR_TOKEN }}

  # Build and push Docker images (only on main branch)
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ secrets.DOCKER_USERNAME }}/search-engine
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push backend services
      run: |
        cd search_engine_microservice
        for service in */; do
          if [ -f "$service/Dockerfile" ]; then
            echo "Building $service..."
            cd "$service"
            docker build -t ${{ secrets.DOCKER_USERNAME }}/search-engine-$service:${{ github.sha }} .
            docker push ${{ secrets.DOCKER_USERNAME }}/search-engine-$service:${{ github.sha }}
            cd ..
          fi
        done

    - name: Build and push frontend
      uses: docker/build-push-action@v5
      with:
        context: ./search-engine-ui
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/search-engine-ui:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # Deploy to staging (only on main branch)
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-images]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: staging

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy to staging
      run: |
        echo "Deploying to staging environment..."
        # Add your deployment commands here
        # For example, using kubectl, helm, or other deployment tools
        
    - name: Run smoke tests
      run: |
        echo "Running smoke tests..."
        # Add smoke tests to verify deployment
        
    - name: Notify deployment status
      uses: 8398a7/action-slack@v3
      if: always()
      with:
        status: ${{ job.status }}
        channel: '#deployments'
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        fields: repo,message,commit,author,action,eventName,ref,workflow

  # Security scanning
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results.sarif'

    - name: Run CodeQL Analysis
      uses: github/codeql-action/analyze@v2
      with:
        languages: java, javascript