# SonarQube Configuration for Search Engine Project

# Project identification
sonar.projectKey=search-engine
sonar.projectName=Search Engine Microservices
sonar.projectVersion=1.0.0-SNAPSHOT

# Source code configuration
sonar.sources=search_engine_microservice,search-engine-ui/src
sonar.tests=search_engine_microservice,search-engine-ui/src

# Language-specific configurations
sonar.java.source=17
sonar.java.target=17
sonar.java.binaries=search_engine_microservice/*/target/classes
sonar.java.test.binaries=search_engine_microservice/*/target/test-classes
sonar.java.libraries=search_engine_microservice/*/target/dependency/*.jar

# TypeScript/Angular configuration
sonar.typescript.node=node
sonar.typescript.lcov.reportPaths=search-engine-ui/coverage/lcov.info

# Exclusions
sonar.exclusions=**/node_modules/**,**/target/**,**/dist/**,**/*.spec.ts,**/*.spec.js,**/test/**,**/tests/**

# Test exclusions
sonar.test.exclusions=**/*.spec.ts,**/*.spec.js,**/test/**,**/tests/**

# Coverage exclusions
sonar.coverage.exclusions=**/*.spec.ts,**/*.spec.js,**/test/**,**/tests/**,**/main.ts,**/polyfills.ts,**/environments/**

# Quality gate configuration
sonar.qualitygate.wait=true

# Code quality thresholds
sonar.coverage.minimum=80.0
sonar.duplicated_lines_density.maximum=3.0
sonar.maintainability_rating.maximum=A
sonar.reliability_rating.maximum=A
sonar.security_rating.maximum=A

# Additional settings
sonar.sourceEncoding=UTF-8
sonar.scm.provider=git
sonar.scm.forceReloadAll=true

# Plugin-specific settings
sonar.java.checkstyle.reportPaths=search_engine_microservice/*/target/checkstyle-result.xml
sonar.java.spotbugs.reportPaths=search_engine_microservice/*/target/spotbugsXml.xml
sonar.jacoco.reportPaths=search_engine_microservice/*/target/jacoco.exec